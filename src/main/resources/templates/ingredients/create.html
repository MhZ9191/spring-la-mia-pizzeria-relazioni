<!doctype html>
<html lang="en" xmlns="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header th:replace="fragments/fragment :: header" />
    <main>
      <section>
        <div>
          <form
            th:action="${edit} ? @{/ingredient/{id}/edit(id=${ingredient.id})} : @{/ingredient/create}"
            th:object="${ingredient}"
            method="post"
          >
            <label for="">NAME</label>
            <input type="text" th:errorClass="invalid" th:field="*{name}" />
            <div th:if="${#fields.errors('name')}">
              <ul>
                <li
                  th:each="error : ${#fields.errors('name')}"
                  th:text="${error}"
                />
              </ul>
            </div>
            <div>
              <input type="submit" />
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
