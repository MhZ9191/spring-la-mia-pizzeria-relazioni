<!doctype html>
<html lang="en" xmlns="http:///www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header th:replace="fragments/fragment :: header" />
    <main>
      <section>
        <div>
          <form
            th:action="${edit} ? @{/{id}/edit(id=${pizza.id})} : @{/create}"
            th:object="${pizza}"
            method="post"
          >
            <label for="pizza-name">PIZZA NAME</label>
            <input
              id="pizza-name"
              type="text"
              th:field="*{name}"
              th:errorClass="invalid"
            />
            <div th:if="${#fields.hasErrors('name')}">
              <ul>
                <li
                  th:each="error : ${#fields.hasErrors('name')}"
                  th:text="error"
                />
              </ul>
            </div>
            <label for="pizza-desc">PIZZA DESCRIPTION</label>
            <input
              id="pizza-desc"
              type="text"
              th:field="*{description}"
              th:errorClass="invalid"
            />
            <div th:if="${#fields.hasErrors('description')}">
              <ul>
                <li
                  th:each="error : ${#fields.hasErrors('description')}"
                  th:text="error"
                />
              </ul>
            </div>
            <label for="pizza-price">PIZZA PRICE</label>
            <input
              id="pizza-price"
              type="number"
              min="0"
              th:field="*{price}"
              th:errorClass="invalid"
            />
            <div th:if="${#fields.hasErrors('price')}">
              <ul>
                <li
                  th:each="error : ${#fields.hasErrors('price')}"
                  th:text="error"
                />
              </ul>
            </div>
            <input type="submit" />
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
